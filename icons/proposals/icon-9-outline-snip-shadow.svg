<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shadowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ea1ff"/>
      <stop offset="1" stop-color="#2ddfb5"/>
    </linearGradient>
  </defs>

  <!-- back layer: blue-green "shadow", offset diagonally down-right -->
  <path d="M 22 22
           L 92 22
           L 118 48
           L 118 118
           L 22 118 Z"
        fill="none"
        stroke="url(#shadowGrad)"
        stroke-width="10"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- front layer: black outline with snipped corner -->
  <path d="M 10 10
           L 80 10
           L 106 36
           L 106 106
           L 10 106 Z"
        fill="none"
        stroke="#0a0b0e"
        stroke-width="10"
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>
