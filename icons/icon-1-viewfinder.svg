<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26262a"/>
      <stop offset="1" stop-color="#101012"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background plate -->
  <rect width="128" height="128" rx="28" fill="url(#bg1)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow1)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- viewfinder corner brackets -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.95">
    <!-- top-left -->
    <path d="M22 42 V28 H36"/>
    <!-- top-right -->
    <path d="M92 28 H106 V42"/>
    <!-- bottom-right -->
    <path d="M106 86 V100 H92"/>
    <!-- bottom-left -->
    <path d="M36 100 H22 V86"/>
  </g>

  <!-- magnifier in center -->
  <g transform="translate(64 64)">
    <!-- handle (drawn under glass to look attached) -->
    <line x1="14" y1="14" x2="26" y2="26"
          stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" stroke-linecap="round"/>
    <!-- glass -->
    <circle cx="0" cy="0" r="18" fill="#1a1a1c" stroke="#ffffff" stroke-opacity="0.95" stroke-width="5"/>
    <!-- plus -->
    <path d="M-8 0 H8 M0 -8 V8" stroke="#ffffff" stroke-opacity="0.95" stroke-width="3.6" stroke-linecap="round"/>
  </g>
</svg>
