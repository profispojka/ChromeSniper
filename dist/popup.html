<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <title>Drag Square Drawer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: rgb(28, 28, 30);
        color: rgba(255, 255, 255, 0.95);
        font: 400 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        width: max-content;
        min-width: 220px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
      .title {
        font: 600 14px/1.2 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 64px;
      }
      button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        padding: 0;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.95);
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.18);
      }
      button:active {
        transform: scale(0.96);
      }
      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .icon {
        width: 20px;
        height: 20px;
      }
      .label {
        font-size: 11px;
        line-height: 1.2;
        color: rgba(255, 255, 255, 0.75);
        text-align: center;
      }
      .status {
        font-size: 11px;
        color: rgba(255, 200, 0, 0.85);
        min-height: 14px;
        text-align: center;
      }
      .footer {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        text-align: center;
      }
      .footer a {
        color: inherit;
        text-decoration: none;
      }
      .footer a:hover {
        color: rgba(255, 255, 255, 0.75);
      }
    </style>
  </head>
  <body>
    <div class="title">Drag Square Drawer</div>
    <div class="row">
      <div class="item">
        <button id="picker" type="button" title="Color picker">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <path d="m2 22 1-1h3l9-9"/>
            <path d="M3 21v-3l9-9"/>
            <path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/>
          </svg>
        </button>
        <span class="label">Pipeta</span>
      </div>
      <div class="item">
        <button id="fullpage" type="button" title="Snímek celé stránky">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="3" width="16" height="18" rx="2"/>
            <line x1="4" y1="9" x2="20" y2="9"/>
            <line x1="4" y1="15" x2="20" y2="15"/>
          </svg>
        </button>
        <span class="label">Celá stránka</span>
      </div>
      <div class="item">
        <button id="history" type="button" title="Historie screenshotů">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M12 7v5l3 2"/>
          </svg>
        </button>
        <span class="label">Historie</span>
      </div>
    </div>
    <div class="status" id="status"></div>
    <div class="footer">by <a href="https://entyai.cz" target="_blank" rel="noopener">entyai.cz</a></div>
    <script src="popup.js"></script>
  </body>
</html>
