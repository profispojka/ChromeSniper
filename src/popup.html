<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <title>Drag Square Drawer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: rgb(28, 28, 30);
        color: rgba(255, 255, 255, 0.95);
        font: 400 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        width: 260px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .title {
        font: 600 14px/1.2 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin-bottom: 2px;
      }
      .hint {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
      }
      button {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.95);
        font: 500 13px/1.2 inherit;
        cursor: pointer;
        text-align: left;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.18);
      }
      button:active {
        transform: scale(0.98);
      }
      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .icon {
        flex-shrink: 0;
        width: 18px;
        height: 18px;
      }
      .label {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .kbd {
        font: 500 11px/1 ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
        color: rgba(255, 255, 255, 0.55);
      }
      .status {
        font-size: 12px;
        color: rgba(255, 200, 0, 0.85);
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <div class="title">Drag Square Drawer</div>
    <div class="hint">Tažením s <span class="kbd">Shift</span> vyber oblast a zazoomuj.</div>
    <button id="fullpage" type="button">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="3" width="16" height="18" rx="2"/>
        <line x1="4" y1="9" x2="20" y2="9"/>
        <line x1="4" y1="15" x2="20" y2="15"/>
      </svg>
      <span class="label">
        <span>Snímek celé stránky</span>
        <span class="kbd" id="hotkey-hint"></span>
      </span>
    </button>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
